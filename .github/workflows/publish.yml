name: Publish Quarto Site

# Runs on m119-site only. m119_master shares this file via the m119-site
# remote mirror-push, but has no gh-pages target so the job self-skips there.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    if: github.repository == 'chaz-clark/m119-site'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
