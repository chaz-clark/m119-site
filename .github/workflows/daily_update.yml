name: Daily Schedule Update

on:
  schedule:
    - cron: "15 16 * * 1-5"  # 10:15am MDT (UTC-6) Mon-Fri — adjust per term when teaching time changes
  workflow_dispatch:          # allow manual trigger

jobs:
  update-schedule:
    # Runs on m119-site only. m119_master mirrors this file but doesn't own
    # publishing; letting it run there creates duplicate bot commits and
    # persistent divergence between the two remotes.
    if: github.repository == 'chaz-clark/m119-site'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate today's schedule
        run: python tools/generate_schedule.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet site/_today.qmd site/schedule.qmd site/schedule_full.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/_today.qmd site/schedule.qmd site/schedule_full.json
          git commit -m "chore: daily schedule update $(date -u +%Y-%m-%d)"
          git push
